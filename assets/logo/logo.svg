<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle (gold border) -->
  <circle cx="128" cy="128" r="125" fill="none" stroke="#FFC107" stroke-width="8"/>
  
  <!-- Main seal circle (forest green background) -->
  <circle cx="128" cy="128" r="118" fill="#2D6E4F"/>
  
  <!-- Inner decorative circle -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#FFC107" stroke-width="2"/>
  
  <!-- Government building icon (simplified) -->
  <g transform="translate(128, 128)">
    <!-- Roof/Triangle -->
    <polygon points="0,-35 -28,-5 28,-5" fill="#FFC107"/>
    
    <!-- Building body -->
    <rect x="-25" y="-5" width="50" height="40" fill="#FFFFFF" stroke="#FFC107" stroke-width="2"/>
    
    <!-- Windows (3x2 grid) -->
    <rect x="-18" y="0" width="8" height="8" fill="#2D6E4F"/>
    <rect x="-4" y="0" width="8" height="8" fill="#2D6E4F"/>
    <rect x="10" y="0" width="8" height="8" fill="#2D6E4F"/>
    
    <rect x="-18" y="12" width="8" height="8" fill="#2D6E4F"/>
    <rect x="-4" y="12" width="8" height="8" fill="#2D6E4F"/>
    <rect x="10" y="12" width="8" height="8" fill="#2D6E4F"/>
    
    <!-- Door -->
    <rect x="-6" y="25" width="12" height="15" fill="#FFC107" stroke="#2D6E4F" stroke-width="1"/>
    <circle cx="-2" cy="32" r="1.5" fill="#2D6E4F"/>
    
    <!-- Flag/Banner at top -->
    <line x1="-1" y1="-40" x2="-1" y2="-30" stroke="#FFC107" stroke-width="2"/>
    <polygon points="-1,-30 12,-25 -1,-20" fill="#FFC107"/>
  </g>
  
  <!-- Stars around the seal (5 points) -->
  <g fill="#FFC107">
    <!-- Top star -->
    <polygon points="128,30 132,43 147,43 135,52 140,65 128,56 116,65 121,52 109,43 124,43"/>
    
    <!-- Right star -->
    <polygon points="210,80 214,93 229,93 217,102 222,115 210,106 198,115 203,102 191,93 206,93"/>
    
    <!-- Bottom right star -->
    <polygon points="195,195 199,208 214,208 202,217 207,230 195,221 183,230 188,217 176,208 191,208"/>
    
    <!-- Bottom left star -->
    <polygon points="61,195 65,208 80,208 68,217 73,230 61,221 49,230 54,217 42,208 57,208"/>
    
    <!-- Left star -->
    <polygon points="46,80 50,93 65,93 53,102 58,115 46,106 34,115 39,102 27,93 42,93"/>
  </g>
  
  <!-- Text circle (bottom) -->
  <path id="textCircle" d="M 40,128 A 88,88 0 0,1 216,128" fill="none"/>
  <text font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#FFC107" letter-spacing="3">
    <textPath href="#textCircle" startOffset="50%" text-anchor="middle">
      CITY OF GENERAL TRIAS
    </textPath>
  </text>
</svg>
